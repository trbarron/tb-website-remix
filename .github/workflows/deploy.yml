name: рЯЪА Deploy

on:
  push:
    branches:
      - master
  pull_request:
  workflow_dispatch:
    inputs:
      run_lint:
        description: 'Run ESLint check'
        required: true
        type: boolean
        default: false
      run_typecheck:
        description: 'Run TypeScript check'
        required: true
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  actions: write
  contents: read

defaults:
  run:
    shell: bash

jobs:
  lint:
    name: вђ£ ESLint
    runs-on: ubuntu-latest
    if: github.event.inputs.run_lint == 'true'
    steps:
      - name: вђЗпЄП Checkout repo
        uses: actions/checkout@v4

      - name: вОФ Setup node
        uses: actions/setup-node@v4
        with:
          cache: npm
          cache-dependency-path: ./package.json
          node-version: 18

      - name: рЯУ• Install deps
        run: npm install

      - name: рЯФђ Lint
        run: npm run lint

  typecheck:
    name:  ¶ TypeScript
    runs-on: ubuntu-latest
    if: github.event.inputs.run_typecheck == 'true'
    steps:
      - name: вђЗпЄП Checkout repo
        uses: actions/checkout@v4

      - name: вОФ Setup node
        uses: actions/setup-node@v4
        with:
          cache: npm
          cache-dependency-path: ./package.json
          node-version: 18

      - name: рЯУ• Install deps
        run: npm install

      - name: рЯФО Type check
        run: npm run typecheck --if-present

  deploy:
    # needs: [lint, typecheck]
    runs-on: ubuntu-latest

    steps:
      - name: рЯЫС Cancel Previous Runs
        uses: styfle/cancel-workflow-action@0.12.1

      - name: вђЗпЄП Checkout repo
        uses: actions/checkout@v4

      - name: вОФ Setup node
        uses: actions/setup-node@v4
        with:
          cache: npm
          cache-dependency-path: ./package.json
          node-version: 18

      - name: рЯСА Env
        run: |
          echo "Event name: ${{ github.event_name }}"
          echo "Git ref:    ${{ github.ref }}"
          echo "GH actor:   ${{ github.actor }}"
          echo "SHA:        ${{ github.sha }}"
          VER=`node --version`; echo "Node ver:   $VER"
          VER=`npm --version`; echo "npm ver:    $VER"

      - name: рЯУ• Install deps
        run: npm install

      - name: рЯПЧ Build
        run: |
          npm run build
          # Debug: List build output
          echo "Build directory contents:"
          ls -la public/build/
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}

      - name: рЯЫ† Install Arc
        run: |
          npm i -g @architect/architect
          # Ensure server directory exists
          mkdir -p server
          # Copy build files to server directory
          cp build/index.js server/index.js || echo "No server build found"
          # Debug: List directories
          echo "Server directory contents:"
          ls -la server/
          echo "Build directory contents:"
          ls -la public/build/

      - name: рЯЪА Production Deploy
        if: github.ref == 'refs/heads/master'
        run: |
          # Debug: Show current directory structure
          pwd
          ls -la
          arc deploy --production --prune --verbose
        env:
          CI: true
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}